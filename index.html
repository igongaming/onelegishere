<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>LEG FINDER SIMULATOR</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        canvas { display: block; max-width: 100vw; max-height: 100vh; }
        #controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 10; flex-wrap: wrap; justify-content: center;
        }
        .btn {
            width: 60px; height: 60px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.5); background: rgba(0,0,0,0.5);
            color: #fff; font-size: 24px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; -webkit-tap-highlight-color: transparent;
        }
        .btn:active { background: rgba(255,255,255,0.3); }
        .btn-small { width: 45px; height: 45px; font-size: 16px; }
        #startScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; align-items: center; justify-content: center;
            z-index: 100; cursor: pointer;
        }
        #startScreen img { max-width: 80%; max-height: 80%; }
        #loading {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; font-family: Arial; font-size: 24px; z-index: 200;
        }
        @media (min-width: 1024px) { #controls { display: none; } }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <div id="loading">Загрузка...</div>
    <div id="startScreen" style="display:none;">
        <img src="10diss.png" alt="Начать игру" id="startImg">
    </div>
    <div id="controls">
        <button class="btn" id="btn-left">◀</button>
        <button class="btn" id="btn-right">▶</button>
        <button class="btn" id="btn-jump">▲</button>
        <button class="btn btn-small" id="btn-melee">F</button>
        <button class="btn btn-small" id="btn-range">G</button>
        <button class="btn btn-small" id="btn-ult">T</button>
        <button class="btn btn-small" id="btn-interact">E</button>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const GAME_WIDTH = 800;
        const GAME_HEIGHT = 600;
        let scale = 1;

        function resize() {
            scale = Math.min(window.innerWidth / GAME_WIDTH, window.innerHeight / GAME_HEIGHT);
            canvas.width = GAME_WIDTH * scale;
            canvas.height = GAME_HEIGHT * scale;
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.scale(scale, scale);
        }
        window.addEventListener('resize', resize);
        resize();

        const imgs = {};
        const bgImgs = [];
        const names = [
            'bg_start','babka','portal',
            'hero_stand','hero_walk1','hero_walk2','hero_jump','hero_hitting','hero_diss',
            'hero_ult_1','hero_ult_2','hero_ult_3',
            'bullet','10diss',
            'simak_idle','simak_walk1','simak_walk2','simak_hurt','simak_hitting','simak_dead',
            'judge1_idle','judge1_hit','judge2_idle','judge2_hit','judge3_idle','judge3_hit',
            'hero_hp_1','hero_hp_2','hero_hp_3','hero_hp_4','hero_hp_5'
        ];
        const allNames = [...names];
        for (let i = 1; i <= 10; i++) allNames.push('bg_' + i);

        let total = allNames.length;
        let done = 0;

        function loadOne(name) {
            return new Promise(resolve => {
                const img = new Image();
                img.onload = () => { done++; updateLoading(); resolve(img); };
                img.onerror = () => { done++; updateLoading(); resolve(null); };
                img.src = name + '.png';
            });
        }

        function updateLoading() {
            const pct = Math.floor(done / total * 100);
            document.getElementById('loading').textContent = 'Загрузка... ' + pct + '%';
        }

        async function loadAll() {
            const tasks = [];
            for (const name of names) {
                tasks.push(loadOne(name).then(img => { imgs[name] = img; }));
            }
            for (let i = 1; i <= 10; i++) {
                tasks.push(loadOne('bg_' + i).then(img => { bgImgs.push(img); }));
            }
            await Promise.all(tasks);
            document.getElementById('loading').style.display = 'none';
            document.getElementById('startScreen').style.display = 'flex';
        }

        document.getElementById('startScreen').addEventListener('click', () => {
            document.getElementById('startScreen').style.display = 'none';
            lastTime = performance.now();
            requestAnimationFrame(loop);
        });

        const STATE_START = "start", STATE_LEVEL1 = "level1";
        let gameState = STATE_START;
        const DIALOG_NONE = 0, DIALOG_PRESS_E = 1, DIALOG_CHOICES = 2;
        const WORLD_WIDTH = 8000, GROUND_Y = 450, GRAVITY = 0.8;
        let cameraX = 0;

        let hero = {
            x:50,y:GROUND_Y-140,vy:0,speed:5,jumpPower:-22,onGround:false,facingRight:true,
            hp:50,maxHp:50,hitCooldown:0,alive:true,meleeBonus:0,
            walkTimer:0,walkFrame:0,attackTimer:0,isAttacking:false,isDissing:false,dissYOffset:0,
            rangeCooldown:0,rangedHits:0,rangedHitsNeeded:10,ultReady:false,ultActive:false,ultPhase:0,ultTimer:0,ultOverlayTimer:0
        };
        let bullets=[], enemyBullets=[], enemies=[];
        let dialogState=DIALOG_NONE,dialogActive=false,dialogComplete=false,dialogReplica="",dialogChoices=[],dialogNext=null;
        let dissShow=false,dissTimer=0;
        let babkaVisible=false,babkaTextFull="Am I glad to see you! The LEG...and I...and, well, everybody...we're all trapped inside the castle walls. Короче, Меченый, иди и ищи свою ногу. А то пока что НЕНАХОД.";
        let babkaTextDisplayed="",babkaTextIndex=0,babkaTextTimer=0,babkaTextSpeed=0.03,babkaTextDone=false;
        let portalVisible=false,portalX=650,portalY=GROUND_Y-25,heroEnteringPortal=false,heroPortalTimer=0;
        let levelTitle="",levelTitleTimer=0;
        const keys={}, keyJustPressed={};

        function createEnemies(){
            const r=[];
            r.push({type:"simak",x:5700,y:GROUND_Y-30,hp:30,maxHp:30,speed:3,damage:1,facingRight:false,aggroRange:250,hitCooldown:0,walkTimer:0,walkFrame:0,alive:true,hurtTimer:0,state:"idle",deathTimer:0,vy:0,attackType:"melee",shootCooldown:0,seenHero:false});
            r.push({type:"judge3",x:700,y:GROUND_Y-30,hp:4,maxHp:4,speed:2,damage:1,facingRight:true,aggroRange:320,hitCooldown:0,walkTimer:0,walkFrame:0,alive:true,hurtTimer:0,state:"idle",deathTimer:0,vy:0,attackType:"melee",shootCooldown:0,seenHero:false});
            for(const o of[0,60,120]) r.push({type:"judge3",x:1100+o,y:GROUND_Y-30,hp:4,maxHp:4,speed:2,damage:1,facingRight:true,aggroRange:320,hitCooldown:0,walkTimer:0,walkFrame:0,alive:true,hurtTimer:0,state:"idle",deathTimer:0,vy:0,attackType:"melee",shootCooldown:0,seenHero:false});
            r.push({type:"judge2",x:1280,y:GROUND_Y-30,hp:4,maxHp:4,speed:2,damage:2,facingRight:true,aggroRange:320,hitCooldown:0,walkTimer:0,walkFrame:0,alive:true,hurtTimer:0,state:"idle",deathTimer:0,vy:0,attackType:"melee",shootCooldown:0,seenHero:false});
            for(const o of[0,70]) r.push({type:"judge3",x:1600+o,y:GROUND_Y-30,hp:4,maxHp:4,speed:2,damage:1,facingRight:true,aggroRange:320,hitCooldown:0,walkTimer:0,walkFrame:0,alive:true,hurtTimer:0,state:"idle",deathTimer:0,vy:0,attackType:"melee",shootCooldown:0,seenHero:false});
            for(const o of[140,210]) r.push({type:"judge2",x:1600+o,y:GROUND_Y-30,hp:4,maxHp:4,speed:2,damage:2,facingRight:true,aggroRange:320,hitCooldown:0,walkTimer:0,walkFrame:0,alive:true,hurtTimer:0,state:"idle",deathTimer:0,vy:0,attackType:"melee",shootCooldown:0,seenHero:false});
            r.push({type:"judge1",x:1880,y:GROUND_Y-30,hp:4,maxHp:4,speed:2,damage:2,facingRight:true,aggroRange:370,hitCooldown:0,walkTimer:0,walkFrame:0,alive:true,hurtTimer:0,state:"idle",deathTimer:0,vy:0,attackType:"ranged",shootCooldown:0,seenHero:false});
            for(let i=0;i<6;i++){const x=2100+Math.random()*3100;r.push({type:"judge3",x,y:GROUND_Y-30,hp:4,maxHp:4,speed:2,damage:1,facingRight:true,aggroRange:320,hitCooldown:0,walkTimer:0,walkFrame:0,alive:true,hurtTimer:0,state:"idle",deathTimer:0,vy:0,attackType:"melee",shootCooldown:0,seenHero:false});}
            for(let i=0;i<5;i++){const x=2100+Math.random()*3100;r.push({type:"judge2",x,y:GROUND_Y-30,hp:4,maxHp:4,speed:2,damage:2,facingRight:true,aggroRange:320,hitCooldown:0,walkTimer:0,walkFrame:0,alive:true,hurtTimer:0,state:"idle",deathTimer:0,vy:0,attackType:"melee",shootCooldown:0,seenHero:false});}
            for(let i=0;i<3;i++){const x=2100+Math.random()*3100;r.push({type:"judge1",x,y:GROUND_Y-30,hp:4,maxHp:4,speed:2,damage:2,facingRight:true,aggroRange:370,hitCooldown:0,walkTimer:0,walkFrame:0,alive:true,hurtTimer:0,state:"idle",deathTimer:0,vy:0,attackType:"ranged",shootCooldown:0,seenHero:false});}
            return r;
        }
        enemies=createEnemies();

        function dr(text,next){dialogState=DIALOG_PRESS_E;dialogReplica=text;dialogNext=next;}
        function dc(choices,next){dialogState=DIALOG_CHOICES;dialogChoices=choices;dialogNext=next;}
        function de(){dialogState=DIALOG_NONE;dialogActive=false;dialogComplete=true;}
        function hh(d){hero.hp-=d;if(hero.hp<=0)hero.hp=1;de();}
        function bs(){for(const e of enemies)if(e.type==="simak"&&e.alive){e.hp+=20;e.maxHp+=20;e.damage+=1;}de();}
        function ks(){for(const e of enemies)if(e.type==="simak"&&e.alive){e.hp=0;e.state="dead";e.y=GROUND_Y+15;}de();}
        function sj(c,t){let sx=5700;for(const e of enemies)if(e.type==="simak"){sx=e.x;break;}for(let i=0;i<c;i++){enemies.push({type:t,x:sx+150+i*80,y:GROUND_Y-30,hp:4,maxHp:4,speed:2,damage:t==="judge1"?2:(t==="judge2"?2:1),facingRight:true,aggroRange:t==="judge1"?370:320,hitCooldown:0,walkTimer:0,walkFrame:0,alive:true,hurtTimer:0,state:"idle",deathTimer:0,vy:0,attackType:t==="judge1"?"ranged":"melee",shootCooldown:0,seenHero:true});}de();}
        function bb(){hero.hp+=5;hero.meleeBonus+=2;for(const e of enemies)if(e.type==="simak"&&e.alive){e.hp+=5;e.maxHp+=5;e.damage+=2;}de();}
        function h1(){dr("Караван идет",()=>de());}
        function h2(){dr("Я не согласовывал этот дисс.",()=>{dc(["У меня есть скрин переписки.","Когда у тебя днюха?","Иван Симак."],(c)=>{if(c===0)dr("Это ничего не значит. Желтая карточка тебе",()=>hh(3));else if(c===1)dr("Я не буду это комментировать. Ты все равно проиграешь",()=>de());else dr("Я ТЕБЕ СКАЗАЛ, ЧТО НЕ СОГЛАСОВЫВАЛ ЭТОТ ДИСС!",()=>{dc(["Иван Симак.","Да пох. 10 диссов.","Fuck"],(c2)=>{if(c2===0)dr("Ну все, пойдем выскочим на разах!",()=>bs());else if(c2===1){dissShow=true;dissTimer=1.0;dr("ЭТО НЕ ПО ПРАВИЛАМ! КРАСНАЯ КАРТОЧКА!",()=>sj(5,"judge1"));}else dr("Мне это надоело",()=>ks());});});});});}
        function h3(){dr("Какую ногу?!",()=>{dc(["Принцессу Ногу...","Ладно. А альбом Стива не видел?","ГДЕ НОГА?!"],(c)=>{if(c===0)dr("Тут нет никакого замка. Тут ХРАМ ПОЭЗИИ, а не НОГИНСК!",()=>sj(5,"judge3"));else if(c===1)dr("Я его забрал. Но ты его получишь только через мой труп",()=>de());else dr("ША ТУ НЫ",()=>bb());});});}

        function dspr(name,x,y,w,h,fr){
            const img=imgs[name];
            if(!img)return;
            ctx.save();
            if(!fr){ctx.translate(x+w,y);ctx.scale(-1,1);ctx.drawImage(img,0,0,w,h);}
            else ctx.drawImage(img,x,y,w,h);
            ctx.restore();
        }
        function dimg(name,x,y,w,h){
            const img=imgs[name];
            if(!img)return;
            if(w&&h)ctx.drawImage(img,x,y,w,h);
            else ctx.drawImage(img,x,y);
        }
        function ges(enemy){
            if(enemy.state==="dead")return enemy.type+"_idle";
            if(enemy.hurtTimer>0)return enemy.type+"_hurt";
            if(enemy.state==="chase"&&enemy.hitCooldown>0)return enemy.type+"_hitting";
            if(enemy.state==="chase"&&Math.abs(hero.x-enemy.x)>15)return enemy.type+"_walk"+((enemy.walkFrame||0)===0?"1":"2");
            return enemy.type+"_idle";
        }

        function render(){
            ctx.fillStyle="#000";ctx.fillRect(0,0,GAME_WIDTH,GAME_HEIGHT);
            if(gameState===STATE_START){
                dimg('bg_start',0,0,800,600);
                if(babkaVisible){
                    dimg('babka',50,GAME_HEIGHT/2-50,100,100);
                    ctx.fillStyle="#000";ctx.fillRect(170,GAME_HEIGHT/2-60,580,120);
                    ctx.strokeStyle="#fff";ctx.lineWidth=2;ctx.strokeRect(170,GAME_HEIGHT/2-60,580,120);
                    ctx.fillStyle="#fff";ctx.font="18px Arial";
                    const words=babkaTextDisplayed.split(" ");const lines=[];let line="";
                    for(const w of words){const test=line+(line?" ":"")+w;if(ctx.measureText(test).width<560)line=test;else{lines.push(line);line=w;}}
                    if(line)lines.push(line);
                    for(let i=0;i<lines.length;i++)ctx.fillText(lines[i],185,GAME_HEIGHT/2-50+i*22);
                    if(babkaTextDone){ctx.fillStyle="#969696";ctx.fillText("Нажми E",650,GAME_HEIGHT/2+35);}
                }
                if(portalVisible)dimg('portal',portalX,portalY,80,120);
                let sn=heroEnteringPortal?"hero_jump":(hero.walkTimer>0?"hero_walk"+(hero.walkFrame===0?"1":"2"):"hero_stand");
                dspr(sn,hero.x,hero.y,100,140,hero.facingRight);
            }else if(gameState===STATE_LEVEL1){
                for(let i=0;i<bgImgs.length;i++){
                    const bx=i*800-cameraX;
                    if(bx+800>0&&bx<GAME_WIDTH&&bgImgs[i])ctx.drawImage(bgImgs[i],bx,0,800,600);
                }
                for(const e of enemies){if(!e.alive)continue;dspr(ges(e),e.x-cameraX,e.y,135,180,e.facingRight);}
                for(const b of enemyBullets)dimg('bullet',b.x-cameraX-12,b.y-12,25,25);

                let hs="hero_stand";
                if(!hero.alive)hs="hero_jump";
                else if(hero.ultActive)hs="hero_ult_"+hero.ultPhase;
                else if(hero.isDissing)hs="hero_diss";
                else if(hero.isAttacking)hs="hero_hitting";
                else if(!hero.onGround)hs="hero_jump";
                else if(hero.walkTimer>0)hs="hero_walk"+(hero.walkFrame===0?"1":"2");
                const hx=hero.x-cameraX,hy=hero.y+hero.dissYOffset;
                const hw=hs.includes("diss")?140:100,hh=hs.includes("diss")?150:140;
                dspr(hs,hx,hy,hw,hh,hero.facingRight);

                for(const b of bullets)dimg('bullet',b.x-cameraX-17,b.y-17,35,35);
                if(hero.ultReady)dimg('10diss',hx+25,hy-30,50,25);
                if(hero.ultActive&&hero.ultPhase===3&&hero.ultOverlayTimer>0){
                    ctx.fillStyle="rgba(0,0,0,0.7)";ctx.fillRect(0,0,GAME_WIDTH,GAME_HEIGHT);
                    dimg('10diss',GAME_WIDTH/2-175,GAME_HEIGHT/2-87,350,175);
                }
                if(dissShow)dimg('10diss',GAME_WIDTH/2-150,GAME_HEIGHT/2-75,300,150);

                const hpP=hero.hp/hero.maxHp;
                let hpI=hpP>0.8?0:hpP>0.5?1:hpP>0.25?2:hpP>0?3:4;
                dimg('hero_hp_'+(hpI+1),10,10,200,40);

                if(!hero.alive){
                    ctx.fillStyle="rgba(0,0,0,0.6)";ctx.fillRect(0,0,GAME_WIDTH,GAME_HEIGHT);
                    ctx.fillStyle="#f00";ctx.font="48px Arial";ctx.fillText("GAME OVER",GAME_WIDTH/2-120,GAME_HEIGHT/2-20);
                    ctx.fillStyle="#fff";ctx.font="18px Arial";ctx.fillText("R — попробовать еще раз",GAME_WIDTH/2-100,GAME_HEIGHT/2+20);
                }
                if(dialogState!==DIALOG_NONE){
                    ctx.fillStyle="rgba(0,0,0,0.8)";ctx.fillRect(50,GAME_HEIGHT-180,GAME_WIDTH-100,140);
                    ctx.strokeStyle="#fff";ctx.lineWidth=2;ctx.strokeRect(50,GAME_HEIGHT-180,GAME_WIDTH-100,140);
                    ctx.fillStyle="#fff";ctx.font="18px Arial";
                    if(dialogState===DIALOG_PRESS_E){ctx.fillText(dialogReplica,70,GAME_HEIGHT-150);ctx.fillStyle="#969696";ctx.fillText("Нажми E чтобы продолжить",70,GAME_HEIGHT-110);}
                    else if(dialogState===DIALOG_CHOICES){ctx.fillText("Твой ответ:",70,GAME_HEIGHT-150);for(let i=0;i<dialogChoices.length;i++){ctx.fillStyle="#ff0";ctx.fillText((i+1)+". "+dialogChoices[i],90,GAME_HEIGHT-120+i*25);}}
                }
            }
            if(levelTitleTimer>0){ctx.fillStyle="#ff0";ctx.font="48px Arial";ctx.fillText(levelTitle,GAME_WIDTH/2-ctx.measureText(levelTitle).width/2,GAME_HEIGHT/2-30);}
        }

        let lastTime=performance.now();
        let gameStarted = false;

        function update(dt){
            if(dt>0.1)dt=0.1;
            if(!gameStarted) return;
            
            if(gameState===STATE_START){
                if(keys['ArrowLeft']||keys['KeyA']){hero.x-=hero.speed;hero.facingRight=false;hero.walkTimer+=dt;}
                else if(keys['ArrowRight']||keys['KeyD']){hero.x+=hero.speed;hero.facingRight=true;hero.walkTimer+=dt;}
                else{hero.walkTimer=0;hero.walkFrame=0;}
                if(hero.walkTimer>0.15){hero.walkTimer=0;hero.walkFrame=1-hero.walkFrame;}
                if(hero.x<0)hero.x=0;if(hero.x>700)hero.x=700;hero.y=GROUND_Y-30;
                if(!babkaVisible&&hero.x>300)babkaVisible=true;
                if(babkaVisible&&!babkaTextDone){babkaTextTimer+=dt;while(babkaTextTimer>=babkaTextSpeed&&babkaTextIndex<babkaTextFull.length){babkaTextDisplayed+=babkaTextFull[babkaTextIndex];babkaTextIndex++;babkaTextTimer-=babkaTextSpeed;}if(babkaTextIndex>=babkaTextFull.length)babkaTextDone=true;}
                if(babkaTextDone&&keyJustPressed['KeyE'])portalVisible=true;
                if(portalVisible&&!heroEnteringPortal&&hero.x>portalX-30){heroEnteringPortal=true;heroPortalTimer=1.0;}
                if(heroEnteringPortal){heroPortalTimer-=dt;hero.x=portalX;if(heroPortalTimer<=0){gameState=STATE_LEVEL1;levelTitle="ПЕРВЫЙ УРОВЕНЬ";levelTitleTimer=2.0;hero.x=50;hero.y=GROUND_Y-140;hero.vy=0;hero.alive=true;hero.hp=50;hero.hitCooldown=0;hero.onGround=false;hero.meleeBonus=0;cameraX=0;bullets=[];enemyBullets=[];hero.rangedHits=0;hero.ultReady=false;hero.ultActive=false;}}
            }else if(gameState===STATE_LEVEL1){
                if(!hero.ultActive&&!dialogActive&&hero.alive){
                    let m=false;
                    if(keys['ArrowLeft']||keys['KeyA']){hero.x-=hero.speed;hero.facingRight=false;m=true;}
                    if(keys['ArrowRight']||keys['KeyD']){hero.x+=hero.speed;hero.facingRight=true;m=true;}
                    if(m)hero.walkTimer+=dt;else{hero.walkTimer=0;hero.walkFrame=0;}
                    if(hero.walkTimer>0.15){hero.walkTimer=0;hero.walkFrame=1-hero.walkFrame;}
                    if((keys['Space']||keyJustPressed['Space'])&&hero.onGround){hero.vy=hero.jumpPower;hero.onGround=false;}
                    hero.vy+=GRAVITY;hero.y+=hero.vy;
                    if(hero.y>=GROUND_Y){hero.y=GROUND_Y;hero.vy=0;hero.onGround=true;}
                    if(hero.x<0)hero.x=0;if(hero.x>WORLD_WIDTH-100)hero.x=WORLD_WIDTH-100;
                    if(hero.hitCooldown>0)hero.hitCooldown-=dt;
                    if(hero.hp<=0&&hero.alive){hero.alive=false;hero.vy=-10;hero.onGround=false;}
                    if((keys['KeyF']||keyJustPressed['KeyF'])&&hero.attackTimer<=0){hero.attackTimer=0.3;hero.isAttacking=true;for(const e of enemies){if(e.alive&&Math.abs(hero.x-e.x)<80){if(e.state==="dead"){if(hero.x<e.x)e.x+=200;else e.x-=200;if(e.x<0)e.x=0;if(e.x>WORLD_WIDTH-135)e.x=WORLD_WIDTH-135;}else{if(e.type!=="simak"){e.hp-=(3+hero.meleeBonus);e.hurtTimer=0.3;}if(hero.x<e.x)e.x+=20;else e.x-=20;}break;}}}
                    if((keys['KeyG']||keyJustPressed['KeyG'])&&hero.rangeCooldown<=0){hero.rangeCooldown=0.5;hero.isDissing=true;hero.attackTimer=0.3;hero.dissYOffset=-25;bullets.push({x:hero.x+(hero.facingRight?40:-40),y:hero.y+40,dir:hero.facingRight?1:-1,dist:0});}
                }
                if(hero.attackTimer>0)hero.attackTimer-=dt;else{hero.isAttacking=false;hero.isDissing=false;hero.dissYOffset=0;}
                if(hero.rangeCooldown>0)hero.rangeCooldown-=dt;
                for(let i=bullets.length-1;i>=0;i--){const b=bullets[i];b.x+=8*b.dir;b.dist+=8;let hit=false;for(const e of enemies){if(e.alive&&e.state!=="dead"){if(e.type==="simak"&&!dialogComplete)continue;if(Math.abs(b.x-e.x)<125&&Math.abs(b.y-(e.y+80))<60){e.hp-=1;e.hurtTimer=0.3;hero.rangedHits++;if(hero.rangedHits>=hero.rangedHitsNeeded&&!hero.ultReady)hero.ultReady=true;bullets.splice(i,1);hit=true;break;}}}if(!hit&&b.dist>640)bullets.splice(i,1);}
                for(let i=enemyBullets.length-1;i>=0;i--){const b=enemyBullets[i];b.x+=b.speed*b.dir;b.dist+=Math.abs(b.speed);let hit=false;if(hero.alive&&hero.onGround&&Math.abs(b.x-hero.x)<40&&Math.abs(b.y-(hero.y+70))<50){let dmg=b.damage;if(hero.ultActive)dmg=Math.max(1,dmg-1);hero.hp-=dmg;hero.hitCooldown=0.5;hit=true;}if(hit||b.dist>b.maxDist)enemyBullets.splice(i,1);}
                if(hero.ultActive){hero.ultTimer-=dt;if(hero.ultPhase===1&&hero.ultTimer<=0){hero.ultPhase=2;hero.ultTimer=0.45;}else if(hero.ultPhase===2&&hero.ultTimer<=0){hero.ultPhase=3;hero.ultTimer=1.0;hero.ultOverlayTimer=1.0;for(const e of enemies){if(e.alive&&e.state!=="dead"&&Math.abs(hero.x-e.x)<350){e.hp-=8;e.hurtTimer=0.5;}}}else if(hero.ultPhase===3&&hero.ultTimer<=0){hero.ultActive=false;hero.ultPhase=0;}if(hero.ultOverlayTimer>0)hero.ultOverlayTimer-=dt;}
                if(!dialogActive&&!dialogComplete){for(const e of enemies){if(e.type==="simak"&&e.alive&&e.state!=="dead"&&Math.abs(hero.x-e.x)<100&&hero.onGround){dialogActive=true;dr("Я тебя ждал...",()=>{dr("Ты думал, что пройдёшь в финал КБС?",()=>{dc(["Я люблю акростихи","Иван Симак","Ты не видел мою ногу?"],(c)=>{if(c===0)h1();else if(c===1)h2();else h3();});});});break;}}}
                if(!dialogActive){for(const e of enemies){if(!e.alive)continue;const dx=hero.x-e.x,adx=Math.abs(dx);if(e.hurtTimer>0)e.hurtTimer-=dt;if(e.hitCooldown>0)e.hitCooldown-=dt;if(e.shootCooldown>0)e.shootCooldown-=dt;if(adx<e.aggroRange)e.seenHero=true;if(e.state==="landing"){e.y+=4;if(e.y>=GROUND_Y-30){e.y=GROUND_Y-30;e.state="chase";}}if(e.state==="chase"||e.state==="idle"){if(e.type!=="simak"||e.state==="chase"||dialogComplete){if(e.seenHero||adx<e.aggroRange){e.state="chase";if(e.attackType==="ranged"){if(dx>200)e.x+=e.speed;else if(dx<-200)e.x-=e.speed;if(e.shootCooldown<=0&&adx<400){e.shootCooldown=1.2;e.hitCooldown=0.5;enemyBullets.push({x:e.x,y:e.y+80,dir:hero.x>e.x?1:-1,speed:5,dist:0,maxDist:500,damage:e.damage});}}else{if(dx>15)e.x+=e.speed;else if(dx<-15)e.x-=e.speed;}}}}if(e.x<0)e.x=0;if(e.x>WORLD_WIDTH-135)e.x=WORLD_WIDTH-135;if(e.attackType==="melee"&&e.state==="chase"&&adx<50&&hero.alive&&hero.onGround&&hero.hitCooldown<=0&&e.hitCooldown<=0){let dmg=e.damage;if(hero.ultActive)dmg=Math.max(1,dmg-1);hero.hp-=dmg;hero.hitCooldown=1.5;e.hitCooldown=0.7;if(hero.x<e.x){hero.x-=40;hero.vy=-8;}else{hero.x+=40;hero.vy=-8;}hero.onGround=false;}if(e.hp<=0&&e.state!=="dead"){e.state="dead";if(e.type==="simak")e.y=GROUND_Y+15;else{e.deathTimer=0.5;e.vy=-8;}}if(e.state==="dead"&&e.type!=="simak"){e.deathTimer-=dt;if(e.deathTimer>0){e.y+=e.vy;e.vy+=GRAVITY;}else{e.y+=15;if(e.y>GAME_HEIGHT+200)e.alive=false;}}}}
                cameraX=hero.x-GAME_WIDTH/2;if(cameraX<0)cameraX=0;if(cameraX>WORLD_WIDTH-GAME_WIDTH)cameraX=WORLD_WIDTH-GAME_WIDTH;
                if(dissShow){dissTimer-=dt;if(dissTimer<=0)dissShow=false;}
            }
            if(levelTitleTimer>0)levelTitleTimer-=dt;
            keyJustPressed={};
        }

        function loop(ts){
            const dt=Math.min((ts-lastTime)/1000,0.1);
            lastTime=ts;
            update(dt);
            render();
            requestAnimationFrame(loop);
        }

        document.getElementById('startScreen').addEventListener('click', () => {
            document.getElementById('startScreen').style.display = 'none';
            gameStarted = true;
            lastTime = performance.now();
            requestAnimationFrame(loop);
        });

        window.addEventListener('keydown',(e)=>{
            if(!gameStarted) return;
            keys[e.code]=true;keyJustPressed[e.code]=true;
            if(e.code==='KeyE'&&dialogState===DIALOG_PRESS_E&&dialogNext){dialogNext();e.preventDefault();}
            if(e.code==='Digit1'&&dialogState===DIALOG_CHOICES&&dialogChoices.length>=1&&dialogNext){dialogNext(0);e.preventDefault();}
            if(e.code==='Digit2'&&dialogState===DIALOG_CHOICES&&dialogChoices.length>=2&&dialogNext){dialogNext(1);e.preventDefault();}
            if(e.code==='Digit3'&&dialogState===DIALOG_CHOICES&&dialogChoices.length>=3&&dialogNext){dialogNext(2);e.preventDefault();}
            if(e.code==='KeyT'&&hero.alive&&hero.ultReady&&!hero.ultActive&&gameState===STATE_LEVEL1){hero.ultActive=true;hero.ultPhase=1;hero.ultTimer=0.45;hero.rangedHits=0;hero.ultReady=false;}
            if(e.code==='KeyR'&&!hero.alive&&gameState===STATE_LEVEL1){hero.x=50;hero.y=GROUND_Y-140;hero.vy=0;hero.hp=50;hero.alive=true;hero.hitCooldown=0;hero.onGround=false;hero.meleeBonus=0;hero.attackTimer=0;hero.isAttacking=false;hero.isDissing=false;hero.dissYOffset=0;hero.rangeCooldown=0;bullets=[];enemyBullets=[];enemies=createEnemies();dialogActive=false;dialogState=DIALOG_NONE;dialogComplete=false;hero.ultActive=false;hero.ultPhase=0;hero.ultReady=false;hero.rangedHits=0;dissShow=false;}
            if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code))e.preventDefault();
        });
        window.addEventListener('keyup',(e)=>{keys[e.code]=false;});

        function stb(id,code){const btn=document.getElementById(id);if(!btn)return;btn.addEventListener('pointerdown',(e)=>{if(!gameStarted)return;e.preventDefault();keys[code]=true;keyJustPressed[code]=true;});btn.addEventListener('pointerup',(e)=>{e.preventDefault();keys[code]=false;});btn.addEventListener('pointerleave',()=>{keys[code]=false;});}
        stb('btn-left','KeyA');stb('btn-right','KeyD');stb('btn-jump','Space');stb('btn-melee','KeyF');stb('btn-range','KeyG');stb('btn-ult','KeyT');stb('btn-interact','KeyE');

        loadAll();
    </script>
</body>
</html>
