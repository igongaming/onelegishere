<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ОДНА НОГА ЗДЕСЬ v. 1.1</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        canvas { display: block; max-width: 100vw; max-height: 85vh; margin-top: -5vh; }
        #controls {
            position: fixed; bottom: 5px; left: 0; right: 0;
            display: flex; gap: 8px; z-index: 10; flex-wrap: wrap; justify-content: center;
            padding: 0 10px;
        }
        .btn {
            width: 50px; height: 50px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.5); background: rgba(0,0,0,0.6);
            color: #fff; font-size: 20px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; -webkit-tap-highlight-color: transparent;
        }
        .btn:active { background: rgba(255,255,255,0.3); }
        .btn-small { width: 40px; height: 40px; font-size: 14px; }
        #row1 { display: flex; gap: 8px; justify-content: center; width: 100%; }
        #row2 { display: flex; gap: 8px; justify-content: center; width: 100%; }
        #ui-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            z-index: 100; cursor: pointer; background: #000;
        }
        #ui-overlay img { max-width: 60%; max-height: 60%; }
        #loading-text {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; font-family: Arial; font-size: 24px; z-index: 200;
        }
        @media (min-width: 1024px) { #controls { display: none; } }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <div id="loading-text">Загрузка... 0%</div>
    <div id="ui-overlay" style="display:none;">
        <img src="10diss.png" alt="Начать игру" id="start-img">
    </div>
    <div id="controls">
        <div id="row1">
            <button class="btn" id="btn-left">◀</button>
            <button class="btn" id="btn-jump">▲</button>
            <button class="btn" id="btn-right">▶</button>
        </div>
        <div id="row2">
            <button class="btn btn-small" id="btn-melee">F</button>
            <button class="btn btn-small" id="btn-range">G</button>
            <button class="btn btn-small" id="btn-ult">T</button>
            <button class="btn btn-small" id="btn-interact">E</button>
            <button class="btn btn-small" id="btn-restart">R</button>
        </div>
    </div>

    <script>
        // ============================================================
        // КАНВАС
        // ============================================================
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const W = 800, H = 600;
        
        function resize() {
            const s = Math.min(window.innerWidth / W, window.innerHeight / H);
            canvas.width = W * s;
            canvas.height = H * s;
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.scale(s, s);
        }
        window.addEventListener('resize', resize);
        resize();

        // ============================================================
        // ЗАГРУЗКА
        // ============================================================
        const imgs = {};
        const bgImgs = new Array(10).fill(null);
        
        const IMG_NAMES = [
            'bg_start','babka','portal','maska',
            'hero_stand','hero_walk1','hero_walk2','hero_jump','hero_hitting','hero_diss',
            'hero_ult_1','hero_ult_2','hero_ult_3',
            'bullet','10diss',
            'simak_idle','simak_walk1','simak_walk2','simak_hurt','simak_hitting','simak_dead',
            'judge1_idle','judge1_hit','judge2_idle','judge2_hit','judge3_idle','judge3_hit',
            'hero_hp_1','hero_hp_2','hero_hp_3','hero_hp_4','hero_hp_5'
        ];
        
        const allNames = [...IMG_NAMES];
        for (let i = 1; i <= 10; i++) allNames.push('bg_' + i);
        
        let total = allNames.length;
        let loaded = 0;
        
        function loadImage(name) {
            return new Promise(resolve => {
                const img = new Image();
                img.onload = () => { loaded++; updateLoading(); resolve(img); };
                img.onerror = () => { loaded++; updateLoading(); resolve(null); };
                img.src = name + '.png';
            });
        }
        
        function updateLoading() {
            document.getElementById('loading-text').textContent = 'Загрузка... ' + Math.floor(loaded / total * 100) + '%';
        }
        
        async function loadAll() {
            const tasks = [];
            for (const name of IMG_NAMES) {
                tasks.push(loadImage(name).then(img => { imgs[name] = img; }));
            }
            for (let i = 1; i <= 10; i++) {
                const idx = i - 1;
                tasks.push(loadImage('bg_' + i).then(img => { bgImgs[idx] = img; }));
            }
            await Promise.all(tasks);
            document.getElementById('loading-text').style.display = 'none';
            document.getElementById('ui-overlay').style.display = 'flex';
        }

        // ============================================================
        // СОСТОЯНИЯ
        // ============================================================
        const ST_START = 0, ST_LEVEL1 = 1;
        let gameState = ST_START;
        const DIALOG_NONE = 0, DIALOG_REPLICA = 1, DIALOG_CHOICES = 2;
        const WORLD_W = 8000, GROUND = 450, GRAV = 0.8;

        let hero = {
            x:50, y:GROUND-140, vy:0, speed:5, jp:-22, onGround:false, fr:true,
            hp:50, maxHp:50, hc:0, alive:true, mb:0,
            wt:0, wf:0, at:0, isAtt:false, isDiss:false, dyoff:0,
            rc:0, rh:0, rhn:10, ur:false, ua:false, uph:0, ut:0, uot:0
        };
        
        let bullets = [], ebullets = [], enemies = [];
        let dialogSt = DIALOG_NONE, dialogAct = false, dialogComp = false;
        let dialogRep = "", dialogCh = [], dialogNxt = null;
        let dissShow = false, dissTimer = 0;
        let endingActive = false, endingTimer = 2.7, endingFade = 0;
        let simakDied = false;
        
        let bv = false, btFull = "Am I glad to see you! The LEG...and I...and, well, everybody...we're all trapped inside the castle walls. Короче, Меченый, иди и ищи свою ногу. А то пока что НЕНАХОД.";
        let btDisp = "", btIdx = 0, btTimer = 0, btSpeed = 0.03, btDone = false;
        let pv = false, px = 650, py = GROUND-25, hep = false, hpt = 0;
        let lvlTitle = "", lvlTitleTimer = 0;
        let cameraX = 0;
        let gameStarted = false;
        let gamePaused = false;
        let startPulse = 0;
        let startPulseDir = 1;
        let pulseRAF = null;
        
        const keys = {};
        let kp = {};

        // ============================================================
        // ВРАГИ
        // ============================================================
        function mkEnemies() {
            const r = [];
            r.push({t:"simak",x:5700,y:GROUND-30,hp:30,maxHp:30,sp:3,dmg:1,fr:false,ar:250,hc:0,wt:0,wf:0,alive:true,ht:0,st:"idle",dt:0,vy:0,atyp:"melee",sc:0,sh:false});
            r.push({t:"judge3",x:700,y:GROUND-30,hp:4,maxHp:4,sp:2,dmg:1,fr:true,ar:320,hc:0,wt:0,wf:0,alive:true,ht:0,st:"idle",dt:0,vy:0,atyp:"melee",sc:0,sh:false});
            for(const o of[0,60,120]) r.push({t:"judge3",x:1100+o,y:GROUND-30,hp:4,maxHp:4,sp:2,dmg:1,fr:true,ar:320,hc:0,wt:0,wf:0,alive:true,ht:0,st:"idle",dt:0,vy:0,atyp:"melee",sc:0,sh:false});
            r.push({t:"judge2",x:1280,y:GROUND-30,hp:4,maxHp:4,sp:2,dmg:2,fr:true,ar:320,hc:0,wt:0,wf:0,alive:true,ht:0,st:"idle",dt:0,vy:0,atyp:"melee",sc:0,sh:false});
            for(const o of[0,70]) r.push({t:"judge3",x:1600+o,y:GROUND-30,hp:4,maxHp:4,sp:2,dmg:1,fr:true,ar:320,hc:0,wt:0,wf:0,alive:true,ht:0,st:"idle",dt:0,vy:0,atyp:"melee",sc:0,sh:false});
            for(const o of[140,210]) r.push({t:"judge2",x:1600+o,y:GROUND-30,hp:4,maxHp:4,sp:2,dmg:2,fr:true,ar:320,hc:0,wt:0,wf:0,alive:true,ht:0,st:"idle",dt:0,vy:0,atyp:"melee",sc:0,sh:false});
            r.push({t:"judge1",x:1880,y:GROUND-30,hp:4,maxHp:4,sp:2,dmg:2,fr:true,ar:370,hc:0,wt:0,wf:0,alive:true,ht:0,st:"idle",dt:0,vy:0,atyp:"ranged",sc:0,sh:false});
            // +20%: было 6,5,3 -> стало 8,6,4
            for(let i=0;i<8;i++){const x=2100+Math.random()*3100;r.push({t:"judge3",x,y:GROUND-30,hp:4,maxHp:4,sp:2,dmg:1,fr:true,ar:320,hc:0,wt:0,wf:0,alive:true,ht:0,st:"idle",dt:0,vy:0,atyp:"melee",sc:0,sh:false});}
            for(let i=0;i<6;i++){const x=2100+Math.random()*3100;r.push({t:"judge2",x,y:GROUND-30,hp:4,maxHp:4,sp:2,dmg:2,fr:true,ar:320,hc:0,wt:0,wf:0,alive:true,ht:0,st:"idle",dt:0,vy:0,atyp:"melee",sc:0,sh:false});}
            for(let i=0;i<4;i++){const x=2100+Math.random()*3100;r.push({t:"judge1",x,y:GROUND-30,hp:4,maxHp:4,sp:2,dmg:2,fr:true,ar:370,hc:0,wt:0,wf:0,alive:true,ht:0,st:"idle",dt:0,vy:0,atyp:"ranged",sc:0,sh:false});}
            return r;
        }
        enemies = mkEnemies();

        // ============================================================
        // ДИАЛОГ
        // ============================================================
        function drp(text, next) { dialogSt = DIALOG_REPLICA; dialogRep = text; dialogNxt = next; }
        function dch(choices, next) { dialogSt = DIALOG_CHOICES; dialogCh = choices; dialogNxt = next; }
        function dend() { dialogSt = DIALOG_NONE; dialogAct = false; dialogComp = true; }
        function hhd(d) { hero.hp -= d; if (hero.hp <= 0) hero.hp = 1; dend(); }
        function bsim() { for (const e of enemies) if (e.t === "simak" && e.alive && e.st !== "dead") { e.hp += 20; e.maxHp += 20; e.dmg += 1; } dend(); }
        function ksim() { for (const e of enemies) if (e.t === "simak" && e.alive && e.st !== "dead") { e.hp = 0; e.st = "dead"; e.y = GROUND + 15; simakDied = true; endingActive = true; endingTimer = 2.7; } dend(); }
        function spj(c, t) { let sx = 5700; for (const e of enemies) if (e.t === "simak") { sx = e.x; break; } for (let i = 0; i < c; i++) { enemies.push({ t, x: sx + 150 + i * 80, y: GROUND - 30, hp: 4, maxHp: 4, sp: 2, dmg: t === "judge1" ? 2 : (t === "judge2" ? 2 : 1), fr: true, ar: t === "judge1" ? 370 : 320, hc: 0, wt: 0, wf: 0, alive: true, ht: 0, st: "idle", dt: 0, vy: 0, atyp: t === "judge1" ? "ranged" : "melee", sc: 0, sh: true }); } dend(); }
        function bboth() { hero.hp += 5; hero.mb += 2; for (const e of enemies) if (e.t === "simak" && e.alive && e.st !== "dead") { e.hp += 5; e.maxHp += 5; e.dmg += 2; } dend(); }
        
        function h1() { drp("Караван идет", () => dend()); }
        function h2() {
            drp("Я не согласовывал этот дисс.", () => {
                dch(["У меня есть скрин переписки.", "Когда у тебя днюха?", "Иван Симак."], (c) => {
                    if (c === 0) drp("Это ничего не значит. Желтая карточка тебе", () => hhd(3));
                    else if (c === 1) drp("Я не буду это комментировать. Ты все равно проиграешь", () => dend());
                    else drp("Я ТЕБЕ СКАЗАЛ, ЧТО НЕ СОГЛАСОВЫВАЛ ЭТОТ ДИСС!", () => {
                        dch(["Иван Симак.", "Да пох. 10 диссов.", "Fuck"], (c2) => {
                            if (c2 === 0) drp("Ну все, пойдем выскочим на разах!", () => bsim());
                            else if (c2 === 1) { dissShow = true; dissTimer = 1.0; drp("ЭТО НЕ ПО ПРАВИЛАМ! КРАСНАЯ КАРТОЧКА!", () => spj(5, "judge1")); }
                            else drp("Мне это надоело", () => ksim());
                        });
                    });
                });
            });
        }
        function h3() {
            drp("Какую ногу?!", () => {
                dch(["Принцессу Ногу...", "Ладно. А альбом Стива не видел?", "ГДЕ НОГА?!"], (c) => {
                    if (c === 0) drp("Тут нет никакого замка. Тут ХРАМ ПОЭЗИИ, а не НОГИНСК!", () => spj(5, "judge3"));
                    else if (c === 1) drp("Я его забрал. Но ты его получишь только через мой труп", () => dend());
                    else drp("ША ТУ НЫ", () => bboth());
                });
            });
        }

        // ============================================================
        // ОТРИСОВКА
        // ============================================================
        function drawSpr(name, x, y, w, h, fr) {
            const img = imgs[name];
            if (!img) return;
            ctx.save();
            if (!fr) { ctx.translate(x + w, y); ctx.scale(-1, 1); ctx.drawImage(img, 0, 0, w, h); }
            else ctx.drawImage(img, x, y, w, h);
            ctx.restore();
        }
        function drawImg(name, x, y, w, h) {
            const img = imgs[name];
            if (!img) return;
            if (w && h) ctx.drawImage(img, x, y, w, h);
            else ctx.drawImage(img, x, y);
        }
        function getEspr(e) {
            const t = e.t;
            if (e.st === "dead") {
                if (t === "simak") return "simak_dead";
                return t + "_idle";
            }
            if (e.ht > 0) {
                if (t === "simak") return "simak_hurt";
                return t + "_hit";
            }
            if (e.st === "chase" && e.hc > 0) {
                if (t === "simak") return "simak_hitting";
                return t + "_hit";
            }
            if (e.st === "chase" && Math.abs(hero.x - e.x) > 15) {
                if (t === "simak") {
                    e.wt = (e.wt || 0) + 0.016;
                    if (e.wt > 0.2) { e.wt = 0; e.wf = 1 - (e.wf || 0); }
                    return "simak_walk" + ((e.wf || 0) === 0 ? "1" : "2");
                }
                return t + "_idle";
            }
            if (t === "simak") return "simak_idle";
            return t + "_idle";
        }

        function render() {
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, W, H);
            
            if (gameState === ST_START) {
                drawImg('bg_start', 0, 0, 800, 600);
                if (bv) {
                    drawImg('babka', 50, H/2-50, 100, 100);
                    ctx.fillStyle = "#000"; ctx.fillRect(170, H/2-60, 580, 120);
                    ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.strokeRect(170, H/2-60, 580, 120);
                    ctx.fillStyle = "#fff"; ctx.font = "18px Arial";
                    const words = btDisp.split(" "); const lines = []; let line = "";
                    for (const w of words) {
                        const test = line + (line ? " " : "") + w;
                        if (ctx.measureText(test).width < 560) line = test;
                        else { lines.push(line); line = w; }
                    }
                    if (line) lines.push(line);
                    for (let i = 0; i < lines.length; i++) ctx.fillText(lines[i], 185, H/2-40+i*22);
                    if (btDone) { ctx.fillStyle = "#969696"; ctx.fillText("Нажми E", 650, H/2+45); }
                }
                if (pv) drawImg('portal', px, py, 80, 120);
                let sn = hep ? "hero_jump" : (hero.wt > 0 ? "hero_walk" + (hero.wf === 0 ? "1" : "2") : "hero_stand");
                drawSpr(sn, hero.x, hero.y, 100, 140, hero.fr);
                
                ctx.fillStyle = "rgba(255,255,255,0.5)";
                ctx.font = "11px Arial";
                ctx.fillText("←→ / A D — перемещение", W - 200, H - 60);
                ctx.fillText("E — взаимодействие", W - 200, H - 45);
            } else if (gameState === ST_LEVEL1) {
                for (let i = 0; i < bgImgs.length; i++) {
                    const bx = i * 800 - cameraX;
                    if (bx + 800 > 0 && bx < W && bgImgs[i]) ctx.drawImage(bgImgs[i], bx, 0, 800, 600);
                }
                for (const e of enemies) { if (!e.alive) continue; drawSpr(getEspr(e), e.x - cameraX, e.y, 135, 180, true); }
                for (const b of ebullets) drawImg('bullet', b.x - cameraX - 12, b.y - 12, 25, 25);
                
                let hs = "hero_stand";
                if (!hero.alive) hs = "hero_jump";
                else if (hero.ua) hs = "hero_ult_" + hero.uph;
                else if (hero.isDiss) hs = "hero_diss";
                else if (hero.isAtt) hs = "hero_hitting";
                else if (!hero.onGround) hs = "hero_jump";
                else if (hero.wt > 0) hs = "hero_walk" + (hero.wf === 0 ? "1" : "2");
                const hx = hero.x - cameraX, hy = hero.y + hero.dyoff;
                const hw = hs.includes("diss") ? 140 : 100, hh = hs.includes("diss") ? 150 : 140;
                const useFr = hs.includes("diss") ? true : hero.fr;
                drawSpr(hs, hx, hy, hw, hh, useFr);
                
                for (const b of bullets) drawImg('bullet', b.x - cameraX - 17, b.y - 17, 35, 35);
                if (hero.ur) drawImg('10diss', hx + 25, hy - 30, 50, 25);
                if (hero.ua && hero.uph === 3 && hero.uot > 0) {
                    ctx.fillStyle = "rgba(0,0,0,0.7)"; ctx.fillRect(0, 0, W, H);
                    drawImg('10diss', W/2-175, H/2-87, 350, 175);
                }
                if (dissShow) drawImg('10diss', W/2-150, H/2-75, 300, 150);
                
                const hpP = hero.hp / hero.maxHp;
                let hpI = hpP > 0.8 ? 0 : hpP > 0.5 ? 1 : hpP > 0.25 ? 2 : hpP > 0 ? 3 : 4;
                drawImg('hero_hp_' + (hpI+1), 10, 10, 200, 40);
                
                ctx.fillStyle = "rgba(255,255,255,0.6)";
                ctx.font = "11px Arial";
                ctx.fillText("←→ / A D — перемещение", W - 200, H - 60);
                ctx.fillText("ПРОБЕЛ — прыжок", W - 200, H - 45);
                ctx.fillText("F — пинок | G — дисс", W - 200, H - 30);
                ctx.fillText("T — ульта | ESC — пауза", W - 200, H - 15);
                
                if (!hero.alive) {
                    ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(0, 0, W, H);
                    ctx.fillStyle = "#f00"; ctx.font = "48px Arial"; ctx.fillText("GAME OVER", W/2-120, H/2-20);
                    ctx.fillStyle = "#fff"; ctx.font = "18px Arial"; ctx.fillText("R — попробовать еще раз", W/2-100, H/2+20);
                }
                
                if (dialogSt !== DIALOG_NONE) {
                    ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(50, H-180, W-100, 140);
                    ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.strokeRect(50, H-180, W-100, 140);
                    ctx.fillStyle = "#fff"; ctx.font = "18px Arial";
                    if (dialogSt === DIALOG_REPLICA) {
                        ctx.fillText(dialogRep, 70, H-150);
                        ctx.fillStyle = "#969696"; ctx.fillText("Нажми E чтобы продолжить", 70, H-110);
                    } else if (dialogSt === DIALOG_CHOICES) {
                        ctx.fillText("Твой ответ:", 70, H-150);
                        for (let i = 0; i < dialogCh.length; i++) {
                            ctx.fillStyle = "#ff0";
                            ctx.fillText((i+1) + ". " + dialogCh[i], 90, H-120+i*25);
                        }
                    }
                }
            }
            
            if (endingActive && endingFade > 0) {
                ctx.fillStyle = "rgba(0,0,0," + Math.min(endingFade, 1) + ")";
                ctx.fillRect(0, 0, W, H);
                if (endingFade >= 1) {
                    drawImg('maska', W/2 - 75, H/2 - 100, 150, 150);
                    ctx.fillStyle = "#fff";
                    ctx.font = "24px Arial";
                    ctx.fillText("ПРОДОЛЖЕНИЕ СЛЕДУЕТ...", W/2 - 150, H/2 + 70);
                }
            }
            
            if (gamePaused) {
                ctx.fillStyle = "rgba(0,0,0,0.7)";
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = "#fff";
                ctx.font = "36px Arial";
                ctx.fillText("ПАУЗА", W/2 - 80, H/2 - 30);
                ctx.font = "18px Arial";
                ctx.fillText("Нажми ESC чтобы продолжить", W/2 - 130, H/2 + 10);
            }
            
            if (lvlTitleTimer > 0) {
                ctx.fillStyle = "#ff0"; ctx.font = "48px Arial";
                ctx.fillText(lvlTitle, W/2 - ctx.measureText(lvlTitle).width/2, H/2-30);
            }
        }

        // ============================================================
        // ИГРОВОЙ ЦИКЛ
        // ============================================================
        let lastTime = 0;
        
        function update(dt) {
            if (dt > 0.1) dt = 0.1;
            if (!gameStarted || gamePaused) return;
            
            if (gameState === ST_START) {
                if (keys['ArrowLeft'] || keys['KeyA']) { hero.x -= hero.speed; hero.fr = false; hero.wt += dt; }
                else if (keys['ArrowRight'] || keys['KeyD']) { hero.x += hero.speed; hero.fr = true; hero.wt += dt; }
                else { hero.wt = 0; hero.wf = 0; }
                if (hero.wt > 0.15) { hero.wt = 0; hero.wf = 1 - hero.wf; }
                if (hero.x < 0) hero.x = 0; if (hero.x > 700) hero.x = 700;
                hero.y = GROUND - 30;
                if (!bv && hero.x > 300) bv = true;
                if (bv && !btDone) {
                    btTimer += dt;
                    while (btTimer >= btSpeed && btIdx < btFull.length) { btDisp += btFull[btIdx]; btIdx++; btTimer -= btSpeed; }
                    if (btIdx >= btFull.length) btDone = true;
                }
                if (btDone && kp['KeyE']) { pv = true; kp['KeyE'] = false; }
                if (pv && !hep && hero.x > px - 30) { hep = true; hpt = 1.0; }
                if (hep) {
                    hpt -= dt; hero.x = px;
                    if (hpt <= 0) {
                        gameState = ST_LEVEL1; lvlTitle = "ПЕРВЫЙ УРОВЕНЬ"; lvlTitleTimer = 2.0;
                        hero.x = 50; hero.y = GROUND - 140; hero.vy = 0; hero.alive = true; hero.hp = 50;
                        hero.hc = 0; hero.onGround = false; hero.mb = 0; cameraX = 0;
                        bullets = []; ebullets = []; hero.rh = 0; hero.ur = false; hero.ua = false;
                        simakDied = false; endingActive = false; endingTimer = 2.7; endingFade = 0;
                    }
                }
            } else if (gameState === ST_LEVEL1) {
                if (!hero.ua && !dialogAct && hero.alive && endingFade < 1) {
                    let m = false;
                    if (keys['ArrowLeft'] || keys['KeyA']) { hero.x -= hero.speed; hero.fr = false; m = true; }
                    if (keys['ArrowRight'] || keys['KeyD']) { hero.x += hero.speed; hero.fr = true; m = true; }
                    if (m) hero.wt += dt; else { hero.wt = 0; hero.wf = 0; }
                    if (hero.wt > 0.15) { hero.wt = 0; hero.wf = 1 - hero.wf; }
                    if (kp['Space'] && hero.onGround) { hero.vy = hero.jp; hero.onGround = false; kp['Space'] = false; }
                    else { kp['Space'] = false; }
                    hero.vy += GRAV; hero.y += hero.vy;
                    if (hero.y >= GROUND) { hero.y = GROUND; hero.vy = 0; hero.onGround = true; }
                    if (hero.x < 0) hero.x = 0; if (hero.x > WORLD_W - 100) hero.x = WORLD_W - 100;
                    if (hero.hc > 0) hero.hc -= dt;
                    if (hero.hp <= 0 && hero.alive) { hero.alive = false; hero.vy = -10; hero.onGround = false; }
                    
                    if (kp['KeyF'] && hero.at <= 0) {
                        hero.at = 0.3; hero.isAtt = true; kp['KeyF'] = false;
                        for (const e of enemies) {
                            if (e.alive && Math.abs(hero.x - e.x) < 80) {
                                if (e.st === "dead") {
                                    if (hero.x < e.x) e.x += 200; else e.x -= 200;
                                    if (e.x < 0) e.x = 0; if (e.x > WORLD_W - 135) e.x = WORLD_W - 135;
                                } else {
                                    if (e.t !== "simak") { e.hp -= (3 + hero.mb); e.ht = 0.3; }
                                    if (hero.x < e.x) e.x += 20; else e.x -= 20;
                                }
                                break;
                            }
                        }
                    } else { kp['KeyF'] = false; }
                    if (kp['KeyG'] && hero.rc <= 0) {
                        hero.rc = 0.5; hero.isDiss = true; hero.at = 0.3; hero.dyoff = -25; kp['KeyG'] = false;
                        bullets.push({x: hero.x + (hero.fr ? 40 : -40), y: hero.y + 40, dir: hero.fr ? 1 : -1, dist: 0});
                    } else { kp['KeyG'] = false; }
                }
                
                if (hero.at > 0) hero.at -= dt; else { hero.isAtt = false; hero.isDiss = false; hero.dyoff = 0; }
                if (hero.rc > 0) hero.rc -= dt;
                
                for (let i = bullets.length-1; i >= 0; i--) {
                    const b = bullets[i]; b.x += 8 * b.dir; b.dist += 8;
                    let hit = false;
                    for (const e of enemies) {
                        if (e.alive && e.st !== "dead") {
                            if (e.t === "simak" && !dialogComp) continue;
                            if (Math.abs(b.x - e.x) < 125 && Math.abs(b.y - (e.y + 80)) < 60) {
                                e.hp -= 1; e.ht = 0.3; hero.rh++;
                                if (hero.rh >= hero.rhn && !hero.ur) hero.ur = true;
                                bullets.splice(i, 1); hit = true; break;
                            }
                        }
                    }
                    if (!hit && b.dist > 640) bullets.splice(i, 1);
                }
                
                for (let i = ebullets.length-1; i >= 0; i--) {
                    const b = ebullets[i]; b.x += b.speed * b.dir; b.dist += Math.abs(b.speed);
                    let hit = false;
                    if (hero.alive && hero.onGround && Math.abs(b.x - hero.x) < 40 && Math.abs(b.y - (hero.y + 70)) < 50) {
                        let dmg = b.dmg; if (hero.ua) dmg = Math.max(1, dmg - 1);
                        hero.hp -= dmg; hero.hc = 0.5; hit = true;
                    }
                    if (hit || b.dist > b.maxDist) ebullets.splice(i, 1);
                }
                
                if (hero.ua) {
                    hero.ut -= dt;
                    if (hero.uph === 1 && hero.ut <= 0) { hero.uph = 2; hero.ut = 0.45; }
                    else if (hero.uph === 2 && hero.ut <= 0) {
                        hero.uph = 3; hero.ut = 1.0; hero.uot = 1.0;
                        for (const e of enemies) {
                            if (e.alive && e.st !== "dead" && Math.abs(hero.x - e.x) < 350) { e.hp -= 8; e.ht = 0.5; }
                        }
                    } else if (hero.uph === 3 && hero.ut <= 0) { hero.ua = false; hero.uph = 0; }
                    if (hero.uot > 0) hero.uot -= dt;
                }
                
                if (!dialogAct && !dialogComp) {
                    for (const e of enemies) {
                        if (e.t === "simak" && e.alive && e.st !== "dead" && Math.abs(hero.x - e.x) < 100 && hero.onGround) {
                            dialogAct = true;
                            drp("Я тебя ждал...", () => {
                                drp("Ты думал, что пройдёшь в финал КБС?", () => {
                                    dch(["Я люблю акростихи", "Иван Симак", "Ты не видел мою ногу?"], (c) => {
                                        if (c === 0) h1(); else if (c === 1) h2(); else h3();
                                    });
                                });
                            });
                            break;
                        }
                    }
                }
                
                if (!dialogAct) {
                    for (const e of enemies) {
                        if (!e.alive) continue;
                        const dx = hero.x - e.x, adx = Math.abs(dx);
                        if (e.ht > 0) e.ht -= dt;
                        if (e.hc > 0) e.hc -= dt;
                        if (e.sc > 0) e.sc -= dt;
                        if (adx < e.ar) e.sh = true;
                        if (e.st === "landing") { e.y += 4; if (e.y >= GROUND - 30) { e.y = GROUND - 30; e.st = "chase"; } }
                        if (e.st === "chase" || e.st === "idle") {
                            if (e.t !== "simak" || e.st === "chase" || dialogComp) {
                                if (e.sh || adx < e.ar) {
                                    e.st = "chase";
                                    if (e.atyp === "ranged") {
                                        if (dx > 200) e.x += e.sp; else if (dx < -200) e.x -= e.sp;
                                        if (e.sc <= 0 && adx < 400) {
                                            e.sc = 1.2; e.hc = 0.5;
                                            ebullets.push({x: e.x, y: e.y + 80, dir: hero.x > e.x ? 1 : -1, speed: 5, dist: 0, maxDist: 500, dmg: e.dmg});
                                        }
                                    } else {
                                        if (dx > 15) e.x += e.sp; else if (dx < -15) e.x -= e.sp;
                                    }
                                }
                            }
                        }
                        if (e.x < 0) e.x = 0; if (e.x > WORLD_W - 135) e.x = WORLD_W - 135;
                        if (e.atyp === "melee" && e.st === "chase" && adx < 50 && hero.alive && hero.onGround && hero.hc <= 0 && e.hc <= 0) {
                            let dmg = e.dmg; if (hero.ua) dmg = Math.max(1, dmg - 1);
                            hero.hp -= dmg; hero.hc = 1.5; e.hc = 0.7;
                            if (hero.x < e.x) { hero.x -= 40; hero.vy = -8; } else { hero.x += 40; hero.vy = -8; }
                            hero.onGround = false;
                        }
                        if (e.hp <= 0 && e.st !== "dead") {
                            e.st = "dead";
                            if (e.t === "simak") { 
                                e.y = GROUND + 15; e.alive = true;
                                if (!simakDied) {
                                    simakDied = true;
                                    endingActive = true;
                                    endingTimer = 2.7;
                                }
                            }
                            else { e.dt = 0.5; e.vy = -8; }
                        }
                        if (e.st === "dead" && e.t !== "simak") {
                            e.dt -= dt;
                            if (e.dt > 0) { e.y += e.vy; e.vy += GRAV; }
                            else { e.y += 15; if (e.y > H + 200) e.alive = false; }
                        }
                    }
                }
                
                if (endingActive) {
                    endingTimer -= dt;
                    if (endingTimer <= 0) {
                        endingFade += dt * 0.7;
                        if (endingFade >= 1) endingFade = 1;
                    }
                }
                
                cameraX = hero.x - W/2;
                if (cameraX < 0) cameraX = 0;
                if (cameraX > WORLD_W - W) cameraX = WORLD_W - W;
                if (dissShow) { dissTimer -= dt; if (dissTimer <= 0) dissShow = false; }
            }
            if (lvlTitleTimer > 0) lvlTitleTimer -= dt;
            for (const k in kp) kp[k] = false;
        }

        function gameLoop(ts) {
            if (lastTime === 0) lastTime = ts;
            const dt = Math.min((ts - lastTime) / 1000, 0.1);
            lastTime = ts;
            update(dt);
            render();
            requestAnimationFrame(gameLoop);
        }

        function startPulseLoop() {
            startPulse += 0.05 * startPulseDir;
            if (startPulse > 25) startPulseDir = -1;
            if (startPulse < -25) startPulseDir = 1;
            const startImg = document.getElementById('start-img');
            if (startImg && !gameStarted) {
                const base = Math.min(window.innerWidth, window.innerHeight) * 0.6;
                const w = base + startPulse * 3;
                const h = w * 0.5;
                startImg.style.width = w + 'px';
                startImg.style.height = h + 'px';
                pulseRAF = requestAnimationFrame(startPulseLoop);
            }
        }

        // ============================================================
        // УПРАВЛЕНИЕ
        // ============================================================
        document.getElementById('ui-overlay').addEventListener('click', () => {
            document.getElementById('ui-overlay').style.display = 'none';
            gameStarted = true;
            lastTime = 0;
            if (pulseRAF) cancelAnimationFrame(pulseRAF);
            requestAnimationFrame(gameLoop);
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Escape') {
                if (!gameStarted) return;
                gamePaused = !gamePaused;
                return;
            }
            if (!gameStarted || gamePaused) return;
            keys[e.code] = true;
            if (e.code === 'KeyE') kp['KeyE'] = true;
            if (e.code === 'KeyF') kp['KeyF'] = true;
            if (e.code === 'KeyG') kp['KeyG'] = true;
            if (e.code === 'Space') { kp['Space'] = true; e.preventDefault(); }
            
            if (e.code === 'KeyE' && dialogSt === DIALOG_REPLICA && dialogNxt) { dialogNxt(); e.preventDefault(); }
            if (e.code === 'Digit1' && dialogSt === DIALOG_CHOICES && dialogCh.length >= 1 && dialogNxt) { dialogNxt(0); e.preventDefault(); }
            if (e.code === 'Digit2' && dialogSt === DIALOG_CHOICES && dialogCh.length >= 2 && dialogNxt) { dialogNxt(1); e.preventDefault(); }
            if (e.code === 'Digit3' && dialogSt === DIALOG_CHOICES && dialogCh.length >= 3 && dialogNxt) { dialogNxt(2); e.preventDefault(); }
            if (e.code === 'KeyT' && hero.alive && hero.ur && !hero.ua && gameState === ST_LEVEL1) {
                hero.ua = true; hero.uph = 1; hero.ut = 0.45; hero.rh = 0; hero.ur = false;
            }
            if (e.code === 'KeyR' && !hero.alive && gameState === ST_LEVEL1) {
                hero.x = 50; hero.y = GROUND - 140; hero.vy = 0; hero.hp = 50; hero.alive = true;
                hero.hc = 0; hero.onGround = false; hero.mb = 0; hero.at = 0;
                hero.isAtt = false; hero.isDiss = false; hero.dyoff = 0; hero.rc = 0;
                bullets = []; ebullets = []; enemies = mkEnemies();
                dialogAct = false; dialogSt = DIALOG_NONE; dialogComp = false;
                hero.ua = false; hero.uph = 0; hero.ur = false; hero.rh = 0; dissShow = false;
                simakDied = false; endingActive = false; endingTimer = 2.7; endingFade = 0;
            }
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) e.preventDefault();
        });
        window.addEventListener('keyup', (e) => { keys[e.code] = false; });

        function stb(id, code) {
            const btn = document.getElementById(id);
            if (!btn) return;
            btn.addEventListener('pointerdown', (e) => {
                if (!gameStarted || gamePaused) return;
                e.preventDefault();
                keys[code] = true;
                if (code === 'KeyE') kp['KeyE'] = true;
                if (code === 'KeyF') kp['KeyF'] = true;
                if (code === 'KeyG') kp['KeyG'] = true;
                if (code === 'Space') kp['Space'] = true;
                if (code === 'KeyT' && hero.alive && hero.ur && !hero.ua && gameState === ST_LEVEL1) {
                    hero.ua = true; hero.uph = 1; hero.ut = 0.45; hero.rh = 0; hero.ur = false;
                }
                if (code === 'KeyR' && !hero.alive && gameState === ST_LEVEL1) {
                    hero.x = 50; hero.y = GROUND - 140; hero.vy = 0; hero.hp = 50; hero.alive = true;
                    hero.hc = 0; hero.onGround = false; hero.mb = 0; hero.at = 0;
                    hero.isAtt = false; hero.isDiss = false; hero.dyoff = 0; hero.rc = 0;
                    bullets = []; ebullets = []; enemies = mkEnemies();
                    dialogAct = false; dialogSt = DIALOG_NONE; dialogComp = false;
                    hero.ua = false; hero.uph = 0; hero.ur = false; hero.rh = 0; dissShow = false;
                    simakDied = false; endingActive = false; endingTimer = 2.7; endingFade = 0;
                }
            });
            btn.addEventListener('pointerup', (e) => { e.preventDefault(); keys[code] = false; });
            btn.addEventListener('pointerleave', () => { keys[code] = false; });
        }
        stb('btn-left', 'KeyA');
        stb('btn-right', 'KeyD');
        stb('btn-jump', 'Space');
        stb('btn-melee', 'KeyF');
        stb('btn-range', 'KeyG');
        stb('btn-ult', 'KeyT');
        stb('btn-interact', 'KeyE');
        stb('btn-restart', 'KeyR');

        loadAll().then(() => {
            pulseRAF = requestAnimationFrame(startPulseLoop);
        });
    </script>
</body>
</html>
